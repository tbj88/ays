<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIYISI · Outdoor Rug Catalog</title>
<style>
  :root{
    --bg:#0f1419;--panel:#1a2129;--panel2:#222c36;--line:#2d3a47;
    --txt:#e8eef3;--txt2:#9fb0c0;--accent:#2f9e6e;--accent2:#3fc88c;
    --warn:#d98a2b;--danger:#c14b4b;--chip:#283642;--shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;background:var(--bg);color:var(--txt);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--accent2);text-decoration:none}
  header{position:sticky;top:0;z-index:50;background:rgba(15,20,25,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .top{max-width:1240px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#06140d}
  .brand h1{font-size:16px;font-weight:700}
  .brand p{font-size:12px;color:var(--txt2)}
  nav{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;align-items:center}
  nav button{background:transparent;border:1px solid transparent;color:var(--txt2);padding:8px 13px;border-radius:9px;cursor:pointer;font-size:14px;transition:.2s}
  nav button:hover{color:var(--txt);background:var(--panel)}
  nav button.active{color:#06140d;background:linear-gradient(135deg,var(--accent),var(--accent2));font-weight:700}
  .langtoggle{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-left:4px}
  .langtoggle button{padding:6px 11px;border-radius:0;font-size:13px;border:none}
  .langtoggle button.on{background:var(--accent);color:#06140d;font-weight:700}
  .adminbadge{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--warn);color:#1a1206;font-weight:700}
  main{max-width:1240px;margin:0 auto;padding:26px 22px 80px;min-height:50vh}
  .hero{background:linear-gradient(135deg,#16241c,#1a2129);border:1px solid var(--line);border-radius:18px;padding:32px;box-shadow:var(--shadow);margin-bottom:24px}
  .hero h2{font-size:26px;margin-bottom:6px}
  .hero .en{color:var(--txt2);font-size:14px;margin-bottom:18px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:20px}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px}
  .stat b{display:block;font-size:22px;color:var(--accent2)}
  .stat span{font-size:12px;color:var(--txt2)}
  .tag{display:inline-block;background:var(--chip);border:1px solid var(--line);color:var(--txt2);padding:4px 11px;border-radius:20px;font-size:12px;margin:3px 4px 0 0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:.2s;display:flex;flex-direction:column;cursor:pointer}
  .card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow)}
  .card .thumb{width:100%;aspect-ratio:1/1;object-fit:cover;background:#0b0f13}
  .card .body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
  .card .pid{font-size:11px;color:var(--accent2);font-weight:700}
  .card .name{font-size:13.5px;font-weight:600;line-height:1.45;min-height:38px}
  .card .price{font-size:15px;color:var(--warn);font-weight:700}
  .card .moq{font-size:12px;color:var(--txt2)}
  .card .acts{display:flex;gap:8px;margin-top:auto;padding-top:8px}
  .card .acts button{flex:1;text-align:center;font-size:12px;padding:7px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);cursor:pointer}
  .card .acts button:hover{background:var(--accent);color:#06140d}
  .card .acts .delp{background:var(--danger);color:#fff;border-color:var(--danger)}
  .vbadge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);color:#fff;font-size:11px;padding:3px 8px;border-radius:6px}
  .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
  .search{flex:1;min-width:220px;position:relative}
  .search input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--txt);padding:12px 14px 12px 40px;font-size:14px}
  .search input:focus{outline:none;border-color:var(--accent)}
  .search svg{position:absolute;left:13px;top:13px;opacity:.5}
  .count{background:var(--chip);border:1px solid var(--line);padding:9px 14px;border-radius:11px;font-size:13px;color:var(--txt2);white-space:nowrap}
  .sec-title{font-size:20px;margin-bottom:4px;display:flex;align-items:center;gap:10px}
  .sec-title .bar{width:4px;height:22px;background:linear-gradient(var(--accent),var(--accent2));border-radius:3px}
  .sec-sub{color:var(--txt2);font-size:13px;margin-bottom:22px}
  .qrow{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px}
  .qrow .q{font-weight:700;color:var(--accent2);margin-bottom:6px;font-size:14.5px}
  .qrow .a{color:var(--txt);font-size:14px;white-space:pre-wrap}
  .qrow .meta{font-size:11px;color:var(--txt2);margin-top:8px}
  .qrow .copy,.qrow .delq,.qrow .editb{float:right;font-size:11px;padding:4px 10px;border-radius:7px;cursor:pointer;margin-left:6px;border:1px solid var(--line)}
  .qrow .copy{background:var(--chip);color:var(--txt2)}
  .qrow .editb{background:var(--chip);color:var(--txt)}
  .qrow .delq{background:var(--danger);color:#fff;border-color:var(--danger)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px}
  .panel h3{font-size:16px;margin-bottom:14px;color:var(--accent2)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--txt2);margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:10px 12px;font-size:14px;font-family:inherit}
  .field textarea{min-height:80px;resize:vertical}
  .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#06140d;border:none;padding:11px 22px;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px}
  .btn:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-ghost{background:var(--chip);color:var(--txt);border:1px solid var(--line)}
  .btn-danger{background:var(--danger);color:#fff}
  .btn-sm{padding:7px 14px;font-size:13px}
  /* detail page */
  .detail{display:grid;grid-template-columns:1fr 1fr;gap:28px}
  @media(max-width:800px){.detail{grid-template-columns:1fr}}
  .gallery .main{width:100%;aspect-ratio:1/1;object-fit:cover;background:#0b0f13;border-radius:14px;border:1px solid var(--line)}
  .gallery .thumbs{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .gallery .thumbs .t{position:relative;width:64px;height:64px;border-radius:8px;overflow:hidden;border:2px solid var(--line);cursor:pointer}
  .gallery .thumbs .t.on{border-color:var(--accent)}
  .gallery .thumbs .t img{width:100%;height:100%;object-fit:cover}
  .gallery .thumbs .t .x{position:absolute;top:0;right:0;background:var(--danger);color:#fff;font-size:11px;width:18px;height:18px;line-height:18px;text-align:center;cursor:pointer}
  .video-wrap{margin-top:16px;position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#000}
  .video-wrap iframe,.video-wrap video{width:100%;height:100%;border:0}
  .spectable{width:100%;border-collapse:collapse;margin-top:8px}
  .spectable td{border:1px solid var(--line);padding:9px 12px;font-size:13.5px}
  .spectable td.k{background:var(--panel2);color:var(--txt2);width:38%;font-weight:600}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--txt2);cursor:pointer;margin-bottom:16px;font-size:14px}
  .back:hover{color:var(--accent2)}
  .uploadzone{border:2px dashed var(--line);border-radius:12px;padding:20px;text-align:center;color:var(--txt2);cursor:pointer;font-size:13px;transition:.2s}
  .uploadzone:hover,.uploadzone.drag{border-color:var(--accent);color:var(--accent2);background:rgba(47,158,110,.06)}
  .empty{color:var(--txt2);font-size:13px;padding:14px;text-align:center;border:1px dashed var(--line);border-radius:10px}
  footer{text-align:center;color:var(--txt2);font-size:12px;padding:30px;border-top:1px solid var(--line)}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--accent);color:#06140d;padding:12px 24px;border-radius:10px;font-weight:700;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s;z-index:99;max-width:90%}
  .toast.show{opacity:1}
  .toast.err{background:var(--danger);color:#fff}
  .loading{text-align:center;padding:60px 20px;color:var(--txt2)}
  .spin{display:inline-block;width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:rot 1s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal.show{display:flex}
  .modal .box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px;max-width:520px;width:100%;box-shadow:var(--shadow);max-height:88vh;overflow:auto}
  .modal h3{font-size:18px;margin-bottom:8px}
  .modal p{color:var(--txt2);font-size:13px;margin-bottom:16px}
  .speceditrow{display:flex;gap:8px;margin-bottom:8px}
  .speceditrow input{flex:1}
  .speceditrow .rm{background:var(--danger);color:#fff;border:none;border-radius:7px;padding:0 12px;cursor:pointer}
  /* === Hero 大图区(YETI 风) === */
  .yhero{position:relative;width:100vw;left:50%;right:50%;margin-left:-50vw;margin-right:-50vw;margin-top:-26px;margin-bottom:40px;height:560px;overflow:hidden;background:#0F2C4D}
  .yhero img{width:100%;height:100%;object-fit:cover;opacity:.88}
  .yhero .overlay{position:absolute;inset:0;background:linear-gradient(to right, rgba(15,44,77,.75) 0%, rgba(15,44,77,.45) 50%, rgba(15,44,77,.15) 100%);display:flex;align-items:center}
  .yhero .inner{max-width:1240px;margin:0 auto;padding:0 22px;width:100%;color:#fff}
  .yhero .kicker{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#3fc88c;font-weight:700;margin-bottom:14px}
  .yhero h1{font-size:54px;line-height:1.1;font-weight:800;margin-bottom:18px;max-width:760px;letter-spacing:-1px}
  .yhero .sub{font-size:18px;max-width:600px;opacity:.92;line-height:1.5;margin-bottom:24px}
  .yhero .cta{display:inline-flex;gap:12px;flex-wrap:wrap}
  .yhero .cta a{padding:14px 30px;border-radius:6px;font-weight:700;font-size:15px;text-decoration:none;transition:.2s;cursor:pointer}
  .yhero .cta .primary{background:#D62828;color:#fff}.yhero .cta .primary:hover{background:#b81f1f}
  .yhero .cta .ghost{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.6)}.yhero .cta .ghost:hover{background:rgba(255,255,255,.1)}
  @media(max-width:768px){.yhero{height:420px}.yhero h1{font-size:32px}.yhero .sub{font-size:15px}}
  /* === 数据成就横条 === */
  .ystats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:40px}
  .ystats .s{background:var(--panel);padding:26px 18px;text-align:center}
  .ystats .s b{display:block;font-size:32px;color:#3fc88c;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
  .ystats .s span{font-size:12px;color:var(--txt2);text-transform:uppercase;letter-spacing:1.5px}
  @media(max-width:600px){.ystats{grid-template-columns:repeat(2,1fr)}}
  /* === 实力 4 卡片 === */
  .ywhy{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:40px}
  .ywhy .w{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;transition:.2s}
  .ywhy .w:hover{border-color:var(--accent);transform:translateY(-3px)}
  .ywhy .w .ic{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:22px;color:#06140d;margin-bottom:14px;font-weight:800}
  .ywhy .w h4{font-size:15px;margin-bottom:6px;color:var(--txt)}
  .ywhy .w p{font-size:13px;color:var(--txt2);line-height:1.5}
  /* === 客户 Logo 墙 === */
  .ylogos{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:30px;margin-bottom:30px}
  .ylogos h3{font-size:13px;color:var(--txt2);text-transform:uppercase;letter-spacing:2.5px;text-align:center;margin-bottom:22px;font-weight:700}
  .ylogos .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:30px;align-items:center}
  .ylogos .row img{width:100%;max-height:55px;object-fit:contain;filter:grayscale(.5) brightness(1.1);opacity:.85;transition:.2s}
  .ylogos .row img:hover{filter:none;opacity:1}
  /* === 三大产品线分类 === */
  .ycats{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin-bottom:30px}
  .ycats .c{position:relative;height:200px;border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid var(--line)}
  .ycats .c img{width:100%;height:100%;object-fit:cover;transition:.4s}
  .ycats .c:hover img{transform:scale(1.08)}
  .ycats .c .lbl{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7),rgba(0,0,0,.15) 60%);display:flex;align-items:flex-end;padding:20px;color:#fff}
  .ycats .c .lbl h4{font-size:22px;font-weight:800;letter-spacing:-.5px}
  .ycats .c .lbl span{display:block;font-size:12px;opacity:.85;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
  @media(max-width:600px){.hero{padding:22px}.hero h2{font-size:21px}}
</style>
</head>
<body>
<header>
  <div class="top">
    <div class="brand">
      <div class="logo">AY</div>
      <div>
        <h1>AIYISI · Outdoor Rug Catalog</h1>
        <p>Taizhou Aiyisi Leisure Products Co., Ltd.</p>
      </div>
    </div>
    <nav id="nav"></nav>
  </div>
</header>
<main id="main"><div class="loading"><div class="spin"></div><p style="margin-top:14px">Loading…</p></div></main>
<div class="toast" id="toast"></div>
<div class="modal" id="loginModal">
  <div class="box">
    <h3 id="lm_title">Admin Login</h3>
    <p id="lm_desc">Enter the admin token (GitHub Token). Stored only in your browser.</p>
    <div class="field"><label id="lm_label">Admin Token</label><input id="tokenInput" type="password" placeholder="ghp_ / github_pat_ ..."></div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn" id="lm_ok" onclick="doLogin()">Login</button>
      <button class="btn btn-ghost" id="lm_cancel" onclick="closeLogin()">Cancel</button>
    </div>
  </div>
</div>
<div class="modal" id="editModal"></div>
<footer id="footer">AIYISI · Outdoor Rug Catalog</footer>
<script>
/* ===== CONFIG ===== */
const GH_OWNER="tbj88",GH_REPO="ays",GH_BRANCH="main",DATA_PATH="data.json";
const SAME_URL=`./${DATA_PATH}`;
const RAW_URL=`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${DATA_PATH}`;
const API_CONTENT=`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${DATA_PATH}`;
const LS_TOKEN="aiyisi_admin_token",LS_LANG="aiyisi_lang",LS_STAFF="aiyisi_staff_ok";
/* 业务员访问密码（共享给内部业务员；仅软门禁，用于对客户隐藏内部话术/SOP） */
const STAFF_PASSWORD="aiyisi2026";

/* ===== STATE ===== */
let DB=null,DATA_SHA=null;
let LANG=localStorage.getItem(LS_LANG)||"en";   // 默认英文
let CUR="home", CUR_PID=null;
const IS_ADMIN_URL=/[?&]admin\b/.test(location.search);
const IS_STAFF_URL=/[?&]staff\b/.test(location.search);
function token(){return localStorage.getItem(LS_TOKEN)||""}
function isAdmin(){return IS_ADMIN_URL && !!token()}
function isStaff(){return IS_STAFF_URL && localStorage.getItem(LS_STAFF)==="1"}
/* 能否查看内部栏目（话术/SOP、情报）：业务员或管理员 */
function canViewInternal(){return isAdmin()||isStaff()}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function toast(m,e){const t=document.getElementById("toast");t.textContent=m;t.className="toast show"+(e?" err":"");setTimeout(()=>t.className="toast",e?3200:1800)}
// 取双语字段：值可能是 {en,zh} 或纯字符串
function L(v){if(v&&typeof v==="object")return v[LANG]||v.en||v.zh||"";return v||""}
/* 阿里国际站标准年限算法：当前年份 - 成立年份(只比较年份，不看月日)
 * 2014 成立 → 2026 显示 12 YRS(与阿里店铺 12YRS 标识完全一致)
 * 每年自然年元旦自动 +1 */
function yearsSince(iso){
  if(!iso)return 0;
  const s=new Date(iso),n=new Date();
  const y=n.getFullYear()-s.getFullYear();
  return Math.max(0,y);
}
function dynamicYears(C){
  const iso=(C&&C.foundedDate)||"";
  const y=yearsSince(iso);
  return y>0 ? {en:y+"-Year Gold Supplier",zh:y+" 年金牌供应商"} : (C&&C.years)||{en:"",zh:""};
}

/* ===== I18N (界面文案) ===== */
const I18N={
  home:{en:"Home",zh:"首页"},
  identity:{en:"Certifications",zh:"身份/资质"},
  products:{en:"Products",zh:"产品中心"},
  intel:{en:"Intel",zh:"情报/画像"},
  scripts:{en:"Scripts",zh:"话术/SOP"},
  brand:{en:"Brand",zh:"品牌资产"},
  cases:{en:"Cases",zh:"合作案例"},
  addCase:{en:"+ Add case",zh:"+ 新增案例"},
  login:{en:"🔒 Admin",zh:"🔒 后台登录"},
  logout:{en:"Logout",zh:"退出"},
  adminmode:{en:"Admin mode",zh:"管理模式"},
  staffLogin:{en:"🔑 Staff",zh:"🔑 员工登录"},
  staffMode:{en:"Staff (read-only)",zh:"员工·只读"},
  staffTitle:{en:"Staff Login",zh:"员工登录"},
  staffDesc:{en:"Enter the staff password to view internal scripts & SOP (read-only).",zh:"输入员工密码即可查看内部话术/SOP（只读，不能修改）。"},
  staffPwLabel:{en:"Staff Password",zh:"员工密码"},
  searchProduct:{en:"Search product name / code...",zh:"搜索产品名称 / 编号..."},
  searchScript:{en:"Search scripts / scene / code...",zh:"搜索话术 / 场景 / 编号..."},
  items:{en:"items",zh:"款"},
  rows:{en:"items",zh:"条"},
  copy:{en:"Copy",zh:"复制"},
  edit:{en:"Edit",zh:"编辑"},
  del:{en:"Delete",zh:"删除"},
  view:{en:"View details",zh:"查看详情"},
  addProduct:{en:"+ Add product",zh:"+ 新增产品"},
  addScript:{en:"+ Add script",zh:"+ 新增话术"},
  addIntel:{en:"+ Add intel",zh:"+ 新增情报"},
  addCert:{en:"+ Add certification",zh:"+ 新增资质"},
  addBrand:{en:"+ Add brand item",zh:"+ 新增品牌项"},
  back:{en:"← Back to products",zh:"← 返回产品列表"},
  specs:{en:"Specifications",zh:"规格参数"},
  basicInfo:{en:"Basic Info.",zh:"基本信息"},
  packaging:{en:"Packaging & Delivery",zh:"包装与配送"},
  grpBasic:{en:"Basic Info",zh:"基本信息"},
  grpPack:{en:"Packaging",zh:"包装配送"},
  grpDesc:{en:"Description params",zh:"描述参数"},
  desc:{en:"Description",zh:"产品描述"},
  video:{en:"Product Video",zh:"产品视频"},
  noSpec:{en:"No specifications yet.",zh:"暂无规格参数。"},
  noDesc:{en:"No description yet.",zh:"暂无产品描述。"},
  price:{en:"Price",zh:"价格"},
  moq:{en:"MOQ",zh:"起订量"},
  inquiry:{en:"Inquire",zh:"询价"},
  companyOverview:{en:"Company Overview",zh:"公司速览"},
  dataSource:{en:"Source",zh:"数据来源"},
  adminTip:{en:" · Admin mode: edit/delete each item",zh:" · 管理模式：可编辑/删除每一条"},

  saving:{en:"Saving to server…",zh:"正在保存到服务器…"},

/* ===== LOAD ===== */
async function loadDB(){
  for(const base of [SAME_URL,RAW_URL]){
    try{const r=await fetch(base+"?t="+Date.now(),{cache:"no-store"});if(!r.ok)throw 0;DB=await r.json();break;}catch(e){}
  }
  if(!DB){document.getElementById("main").innerHTML=`<div class="loading"><p style="color:var(--danger)">Data load failed. Please refresh.</p></div>`;return false;}
  ["products","scripts","intel","certs","brand","cases"].forEach(k=>DB[k]=DB[k]||[]);
  return true;
}
function allProducts(){return DB.products}
function allScripts(){return DB.scripts}

/* ===== LANG / NAV ===== */
function setLang(l){LANG=l;localStorage.setItem(LS_LANG,l);document.documentElement.lang=(l==="zh"?"zh-CN":"en");buildNav();render();}
function buildNav(){
  // 内部栏目 intel/scripts 对客户隐藏；业务员(只读)和管理员可见
  const tabs=[["home",T("home")],["identity",T("identity")],["products",T("products")],["cases",T("cases")],["brand",T("brand")]];
  if(canViewInternal()){tabs.splice(4,0,["intel",T("intel")],["scripts",T("scripts")]);}
  const nav=document.getElementById("nav");
  let html=tabs.map(([t,l])=>`<button data-t="${t}" class="${CUR===t?'active':''}">${l}</button>`).join("");
  html+=`<div class="langtoggle"><button class="${LANG==='en'?'on':''}" onclick="setLang('en')">EN</button><button class="${LANG==='zh'?'on':''}" onclick="setLang('zh')">中</button></div>`;
  if(IS_ADMIN_URL && !isAdmin()) html+=`<button data-t="login" style="color:var(--warn)">${T('login')}</button>`;
  if(isAdmin()) html+=`<span class="adminbadge">${T('adminmode')}</span><button data-t="logout" style="color:var(--txt2)">${T('logout')}</button>`;
  if(IS_STAFF_URL && !isStaff() && !isAdmin()) html+=`<button data-t="stafflogin" style="color:var(--warn)">${T('staffLogin')}</button>`;
  if(isStaff() && !isAdmin()) html+=`<span class="adminbadge" style="background:var(--accent2)">${T('staffMode')}</span><button data-t="stafflogout" style="color:var(--txt2)">${T('logout')}</button>`;
  nav.innerHTML=html;
}

function ytEmbed(url){
  if(!url)return "";
  let id="";
  let m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/);
  if(m)id=m[1];
  if(id)return `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe></div>`;
  if(/\.mp4($|\?)/i.test(url))return `<div class="video-wrap"><video src="${esc(url)}" controls></video></div>`;
  return `<div class="video-wrap"><iframe src="${esc(url)}" allowfullscreen></iframe></div>`;
}

  const basic=specs.filter(s=>(s.g||"basic")==="basic");

function setDetailImg(i){DETAIL_IMG=i;const m=document.getElementById("mainImg");if(m)m.src=DB.products.find(x=>String(x.id)===String(CUR_PID)).images[i];document.querySelectorAll(".thumbs .t").forEach((t,idx)=>t.classList.toggle("on",idx===i));}
function openDetail(pid){CUR_PID=pid;DETAIL_IMG=0;CUR="detail";buildNav();document.getElementById("main").innerHTML=renderDetail();window.scrollTo({top:0,behavior:"smooth"});}

/* ===== GITHUB WRITE ===== */
async function saveDB(msg){
  if(!isAdmin()){toast("Not logged in",true);return false}
  toast(T('saving'));
  try{
    const meta=await fetch(API_CONTENT+"?t="+Date.now(),{headers:{Authorization:"token "+token(),Accept:"application/vnd.github+json"},cache:"no-store"});
    if(meta.ok)DATA_SHA=(await meta.json()).sha;
    DB._updated=new Date().toISOString();
    const b64=btoa(unescape(encodeURIComponent(JSON.stringify(DB,null,2))));
    const res=await fetch(API_CONTENT,{method:"PUT",headers:{Authorization:"token "+token(),Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify({message:msg||"update",content:b64,sha:DATA_SHA,branch:GH_BRANCH})});
    if(!res.ok)throw new Error((await res.json()).message||res.status);
    DATA_SHA=(await res.json()).content.sha;
    toast(T('saved'));return true;
  }catch(e){toast("Save failed: "+e.message,true);return false}
}
function uid(p){return p+Date.now().toString(36)+Math.floor(Math.random()*900+100)}

/* ===== IMAGE UPLOAD (to GitHub /images/) ===== */
async function uploadImg(input){
  const file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){toast("Image too large (max 5MB)",true);return}
  toast(T('uploading'));
  try{
    const b64=await new Promise((rs,rj)=>{const r=new FileReader();r.onload=()=>rs(r.result.split(",")[1]);r.onerror=rj;r.readAsDataURL(file);});
    const ext=(file.name.split(".").pop()||"jpg").toLowerCase();
    const path=`images/${CUR_PID}_${Date.now()}.${ext}`;
    const api=`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`;
    const res=await fetch(api,{method:"PUT",headers:{Authorization:"token "+token(),Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify({message:"Upload image "+path,content:b64,branch:GH_BRANCH})});
    if(!res.ok)throw new Error((await res.json()).message||res.status);
    const url=`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${path}`;
    const p=DB.products.find(x=>String(x.id)===String(CUR_PID));
    p.images=p.images||[];p.images.push(url);
    if(await saveDB("Add image to "+CUR_PID)){document.getElementById("main").innerHTML=renderDetail();}
  }catch(e){toast("Upload failed: "+e.message,true)}
}
function addImgUrl(url){url=url.trim();if(!url)return;const p=DB.products.find(x=>String(x.id)===String(CUR_PID));p.images=p.images||[];p.images.push(url);saveDB("Add image url to "+CUR_PID).then(ok=>{if(ok)document.getElementById("main").innerHTML=renderDetail();});}
async function delProductImg(i){const p=DB.products.find(x=>String(x.id)===String(CUR_PID));if(!confirm("Delete this image?"))return;p.images.splice(i,1);if(DETAIL_IMG>=p.images.length)DETAIL_IMG=0;if(await saveDB("Remove image from "+CUR_PID))document.getElementById("main").innerHTML=renderDetail();}

/* ===== DETAIL IMAGES (product description long images) ===== */
async function uploadDetailImg(input){
  const files=Array.from(input.files||[]);if(!files.length)return;
  const p=DB.products.find(x=>String(x.id)===String(CUR_PID));p.detailImgs=p.detailImgs||[];
  for(const file of files){
    if(file.size>5*1024*1024){toast((file.name||"image")+": >5MB skipped",true);continue;}
    toast(T('uploading'));
    try{
      const b64=await new Promise((rs,rj)=>{const r=new FileReader();r.onload=()=>rs(r.result.split(",")[1]);r.onerror=rj;r.readAsDataURL(file);});
      const ext=(file.name.split(".").pop()||"jpg").toLowerCase();
      const path=`images/${CUR_PID}_detail_${Date.now()}_${Math.floor(Math.random()*999)}.${ext}`;
      const api=`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`;
      const res=await fetch(api,{method:"PUT",headers:{Authorization:"token "+token(),Accept:"application/vnd.github+json","Content-Type":"application/json"},
        body:JSON.stringify({message:"Upload detail image "+path,content:b64,branch:GH_BRANCH})});
      if(!res.ok)throw new Error((await res.json()).message||res.status);
      p.detailImgs.push(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${path}`);
    }catch(e){toast("Upload failed: "+e.message,true);}
  }
  if(await saveDB("Add detail images to "+CUR_PID))document.getElementById("main").innerHTML=renderDetail();
}
function addDetailImgUrl(url){url=url.trim();if(!url)return;const p=DB.products.find(x=>String(x.id)===String(CUR_PID));p.detailImgs=p.detailImgs||[];p.detailImgs.push(url);saveDB("Add detail image url to "+CUR_PID).then(ok=>{if(ok)document.getElementById("main").innerHTML=renderDetail();});}
async function delDetailImg(i){const p=DB.products.find(x=>String(x.id)===String(CUR_PID));if(!confirm(LANG==='zh'?'删除这张详情图？':'Delete this image?'))return;p.detailImgs.splice(i,1);if(await saveDB("Remove detail image from "+CUR_PID))document.getElementById("main").innerHTML=renderDetail();}

/* ===== EDIT MODAL ===== */
/* 字段定义：bl=双语(存{en,zh}), s=单值字符串 */
const SCHEMA={
  products:{title:{en:"Product",zh:"产品"},idp:"AY",fields:[
    {k:"sku",t:"s",label:{en:"Custom SKU / Model No. (optional)",zh:"自定义货号 / 型号（选填）"}},
    {k:"name",t:"bl",label:{en:"Product name",zh:"产品名称"},req:1},
    {k:"price",t:"s",label:{en:"Price",zh:"价格"}},
    {k:"moq",t:"s",label:{en:"MOQ",zh:"起订量"}},
    {k:"video",t:"s",label:{en:"YouTube / video URL",zh:"YouTube / 视频链接"}},
    {k:"desc",t:"bl",label:{en:"Description",zh:"产品描述"},area:1},
  ],hasSpecs:1},
  scripts:{title:{en:"Script",zh:"话术"},idp:"S",fields:[
    {k:"cat",t:"bl",label:{en:"Scene",zh:"场景分类"}},
    {k:"t",t:"bl",label:{en:"Title",zh:"标题"},req:1},
    {k:"c",t:"bl",label:{en:"Content",zh:"内容"},area:1},
  ]},
  intel:{title:{en:"Intel",zh:"情报"},idp:"I",fields:[
    {k:"t",t:"bl",label:{en:"Title",zh:"标题"},req:1},
    {k:"d",t:"bl",label:{en:"Content",zh:"内容"},area:1},
  ]},
  certs:{title:{en:"Certification",zh:"资质"},idp:"C",fields:[
    {k:"t",t:"bl",label:{en:"Title",zh:"标题"},req:1},
    {k:"d",t:"bl",label:{en:"Content",zh:"内容"},area:1},
  ]},
  brand:{title:{en:"Brand item",zh:"品牌项"},idp:"B",fields:[
    {k:"t",t:"bl",label:{en:"Title",zh:"标题"},req:1},
    {k:"d",t:"bl",label:{en:"Content",zh:"内容"},area:1},
  ]},
  cases:{title:{en:"Case",zh:"合作案例"},idp:"CASE",fields:[
    {k:"t",t:"bl",label:{en:"Case title",zh:"案例标题"},req:1},
    {k:"d",t:"bl",label:{en:"Description",zh:"案例描述"},area:1},
    {k:"img",t:"s",label:{en:"Image URL (optional)",zh:"图片链接（选填）"}},
  ]},
};
let EDIT_TYPE=null,EDIT_ID=null,EDIT_SPECS=[];
/* 新增产品时预置的标准规格模板（阿里风格，参数名预填，值留空，你只需填值；不需要的删除即可） */
const PRODUCT_SPEC_TEMPLATE=[
  ["basic","Material","材质"],["basic","Backing","背衬"],["basic","Feature","特性"],
  ["basic","Product Thickness","厚度"],["basic","Shape","形状"],["basic","Style","风格"],
  ["basic","Pattern","图案"],["basic","Technics","工艺"],["basic","Size","尺寸"],
  ["basic","Care Instructions","护理说明"],["basic","Place of Origin","产地"],
  ["basic","Brand Name","品牌"],["basic","Pile Height","绒高"],["basic","Certificate","认证"],
  ["basic","Logo","LOGO"],["basic","Sample","样品"],["basic","Use","用途"],
  ["basic","MOQ","起订量"],["basic","Delivery Time","交货时间"],
  ["packaging","Selling Units","销售单位"],["packaging","Single Package Size","单件包装尺寸"],
  ["packaging","Single Gross Weight","单件毛重"]
];
function newSpecTemplate(){return PRODUCT_SPEC_TEMPLATE.map(([g,en,zh])=>({g:g,k:{en:en,zh:zh},v:{en:"",zh:""}}));}
function fld(id){const e=document.getElementById(id);return e?e.value.trim():""}
function openEdit(type,id){
  if(!isAdmin())return;EDIT_TYPE=type;EDIT_ID=id;
  const sc=SCHEMA[type];const it=id?DB[type].find(x=>String(x.id)===String(id)):null;
  if(it&&it.specs&&it.specs.length)EDIT_SPECS=JSON.parse(JSON.stringify(it.specs));
  else if(!id&&type==="products")EDIT_SPECS=newSpecTemplate();
  else EDIT_SPECS=[];
  const lbl=o=>o[LANG]||o.en;
  let html=`<div class="box"><h3>${id?(LANG==='zh'?'编辑':'Edit'):(LANG==='zh'?'新增':'Add')} ${lbl(sc.title)}</h3>
    <p>${LANG==='zh'?'填中英两种语言；保存后同步到公开链接。':'Fill both EN & 中文; saved to the public link.'}</p>`;
  for(const f of sc.fields){
    const v=it?it[f.k]:"";
    if(f.t==="bl"){
      const en=(v&&typeof v==="object")?v.en:"";const zh=(v&&typeof v==="object")?v.zh:"";
      html+=`<div class="field"><label>${lbl(f.label)} (EN)${f.req?' *':''}</label>${f.area?`<textarea id="ef_${f.k}_en">${esc(en)}</textarea>`:`<input id="ef_${f.k}_en" value="${esc(en)}">`}</div>`;
      html+=`<div class="field"><label>${lbl(f.label)} (中文)</label>${f.area?`<textarea id="ef_${f.k}_zh">${esc(zh)}</textarea>`:`<input id="ef_${f.k}_zh" value="${esc(zh)}">`}</div>`;
    }else{
      const sv=(v&&typeof v==="object")?(v.en||v.zh||""):(v||"");
      html+=`<div class="field"><label>${lbl(f.label)}${f.req?' *':''}</label>${f.area?`<textarea id="ef_${f.k}">${esc(sv)}</textarea>`:`<input id="ef_${f.k}" value="${esc(sv)}">`}</div>`;
    }
  }
  if(sc.hasSpecs){
    html+=`<div class="field"><label>${T('specs')}（${LANG==='zh'?'参数名 / 参数值，可双语':'key / value'}）</label><div id="specEdit">${specEditRows()}</div>
      <button class="btn btn-ghost btn-sm" onclick="addSpecRow()">+ ${LANG==='zh'?'添加参数':'Add spec'}</button>
      <button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="applyTemplate()">${LANG==='zh'?'套用标准模板':'Apply template'}</button></div>`;
  }
  html+=`<div style="display:flex;gap:10px;margin-top:10px"><button class="btn" id="editSaveBtn" onclick="saveEdit()">${LANG==='zh'?'保存':'Save'}</button><button class="btn btn-ghost" onclick="closeEdit()">${LANG==='zh'?'取消':'Cancel'}</button></div></div>`;
  const m=document.getElementById("editModal");m.innerHTML=html;m.classList.add("show");
}
function specEditRows(){
  const opt=(g)=>`<option value="basic"${g==='basic'?' selected':''}>${T('grpBasic')}</option><option value="packaging"${g==='packaging'?' selected':''}>${T('grpPack')}</option><option value="desc"${g==='desc'?' selected':''}>${T('grpDesc')}</option>`;
  return EDIT_SPECS.map((s,i)=>`<div class="speceditrow">
    <select style="flex:0 0 110px" onchange="EDIT_SPECS[${i}].g=this.value">${opt(s.g||'basic')}</select>
    <input value="${esc(L(s.k))}" placeholder="${LANG==='zh'?'参数名':'name'}" oninput="EDIT_SPECS[${i}].k=mkbl(this.value,EDIT_SPECS[${i}].k)">
    <input value="${esc(L(s.v))}" placeholder="${LANG==='zh'?'参数值':'value'}" oninput="EDIT_SPECS[${i}].v=mkbl(this.value,EDIT_SPECS[${i}].v)">
    <button class="rm" onclick="EDIT_SPECS.splice(${i},1);document.getElementById('specEdit').innerHTML=specEditRows()">×</button>
  </div>`).join("")||`<div style="color:var(--txt2);font-size:12px;margin-bottom:8px">${T('noSpec')}</div>`;
}
function mkbl(val,old){const o=(old&&typeof old==="object")?old:{en:"",zh:""};o[LANG]=val;if(!o[LANG==='en'?'zh':'en'])o[LANG==='en'?'zh':'en']=val;return o;}
function addSpecRow(){EDIT_SPECS.push({g:"basic",k:{en:"",zh:""},v:{en:"",zh:""}});document.getElementById("specEdit").innerHTML=specEditRows();}
function applyTemplate(){
  const tpl=newSpecTemplate();
  const have=new Set(EDIT_SPECS.map(s=>(s.k&&s.k.en||"").toLowerCase()));
  tpl.forEach(t=>{if(!have.has(t.k.en.toLowerCase()))EDIT_SPECS.push(t);});
  document.getElementById("specEdit").innerHTML=specEditRows();
}
function closeEdit(){const m=document.getElementById("editModal");m.classList.remove("show");m.innerHTML="";EDIT_TYPE=EDIT_ID=null;EDIT_SPECS=[];}
async function saveEdit(){
  const type=EDIT_TYPE,sc=SCHEMA[type];const obj={};
  for(const f of sc.fields){
    if(f.t==="bl"){
      const en=fld("ef_"+f.k+"_en"),zh=fld("ef_"+f.k+"_zh");
      if(f.req&&!en&&!zh)return toast("Please fill "+(f.label[LANG]||f.label.en),true);
      obj[f.k]={en:en||zh,zh:zh||en};
    }else{obj[f.k]=fld("ef_"+f.k);}
  }
  if(sc.hasSpecs)obj.specs=EDIT_SPECS.filter(s=>(L(s.v)||"").trim()!=="");
  if(type==="products"){const ex=EDIT_ID?DB.products.find(x=>String(x.id)===String(EDIT_ID)):null;obj.images=ex?(ex.images||[]):[];obj.detailImgs=ex?(ex.detailImgs||[]):[];}
  const btn=document.getElementById("editSaveBtn");if(btn){btn.disabled=1;btn.textContent="…";}
  let msg;
  if(EDIT_ID){Object.assign(DB[type].find(x=>String(x.id)===String(EDIT_ID)),obj);msg="Edit "+type;}
  else{obj.id=uid(sc.idp+"-M");DB[type].push(obj);msg="Add "+type;}
  const ok=await saveDB(msg);
  if(ok){closeEdit();if(CUR==="detail")document.getElementById("main").innerHTML=renderDetail();else render();}
  else if(btn){btn.disabled=0;btn.textContent=LANG==='zh'?'保存':'Save';}
}
async function delItem(type,id){
  if(!isAdmin())return;if(!confirm(LANG==='zh'?'确定删除？客户也将看不到。':'Delete this? Clients will not see it.'))return;
  const arr=DB[type];const idx=arr.findIndex(x=>String(x.id)===String(id));if(idx<0)return toast("Not found",true);
  const rm=arr.splice(idx,1)[0];
  if(await saveDB("Delete "+type)){if(CUR==="detail")show("products");else render();}else arr.splice(idx,0,rm);
}

/* ===== LOGIN ===== */
function openLogin(){
  const m=document.getElementById("loginModal");
  m.innerHTML=`<div class="box"><h3>${T('login')==='🔒 Admin'?'Admin Login':'管理员登录'}</h3><p>${LANG==='zh'?'输入管理令牌（GitHub Token），仅保存在你的浏览器。':'Enter the admin token (GitHub Token). Stored only in your browser.'}</p>
    <div class="field"><label>${LANG==='zh'?'管理令牌':'Admin Token'}</label><input id="tokenInput" type="password" placeholder="github_pat_ ..." onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div style="display:flex;gap:10px;margin-top:6px"><button class="btn" onclick="doLogin()">${LANG==='zh'?'登录':'Login'}</button><button class="btn btn-ghost" onclick="closeLogin()">${LANG==='zh'?'取消':'Cancel'}</button></div></div>`;
  m.classList.add("show");setTimeout(()=>{const i=document.getElementById("tokenInput");if(i)i.focus();},100);
}
function closeLogin(){document.getElementById("loginModal").classList.remove("show");}
async function doLogin(){
  const tk=document.getElementById("tokenInput").value.trim();if(!tk)return toast("Enter token",true);
  toast("Verifying…");
  try{
    const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}`,{headers:{Authorization:"token "+tk}});
    if(!r.ok)throw new Error("Invalid token");
    const j=await r.json();if(!j.permissions||!j.permissions.push)throw new Error("No write permission");
    localStorage.setItem(LS_TOKEN,tk);closeLogin();toast(LANG==='zh'?'登录成功':'Logged in');buildNav();show("products");
  }catch(e){toast("Login failed: "+e.message,true)}
}
function logout(){localStorage.removeItem(LS_TOKEN);toast(LANG==='zh'?'已退出':'Logged out');buildNav();show("home");}
/* 员工登录（只读密码门） */
function openStaffLogin(){
  const m=document.getElementById("loginModal");

    <div class="field"><label>${T('staffPwLabel')}</label><input id="staffPwInput" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doStaffLogin()"></div>
    <div style="display:flex;gap:10px;margin-top:6px"><button class="btn" onclick="doStaffLogin()">${LANG==='zh'?'登录':'Login'}</button><button class="btn btn-ghost" onclick="closeLogin()">${LANG==='zh'?'取消':'Cancel'}</button></div></div>`;
  m.classList.add("show");setTimeout(()=>{const i=document.getElementById("staffPwInput");if(i)i.focus();},100);
}
function doStaffLogin(){
  const pw=document.getElementById("staffPwInput").value.trim();
  if(pw!==STAFF_PASSWORD)return toast(LANG==='zh'?'密码错误':'Wrong password',true);
  localStorage.setItem(LS_STAFF,"1");closeLogin();toast(LANG==='zh'?'登录成功':'Logged in');buildNav();show("scripts");
}
function staffLogout(){localStorage.removeItem(LS_STAFF);toast(LANG==='zh'?'已退出':'Logged out');buildNav();show("home");}
function copyTxt(t){navigator.clipboard.writeText(t).then(()=>toast(LANG==='zh'?'已复制':'Copied')).catch(()=>toast("Copy failed",true));}

/* ===== ROUTER ===== */
const VIEWS={home:renderHome,identity:renderIdentity,products:renderProducts,intel:renderIntel,scripts:renderScripts,brand:renderBrand,cases:renderCases};
function render(){
  if(CUR==="detail"){document.getElementById("main").innerHTML=renderDetail();return;}
  const fn=VIEWS[CUR]||renderHome;document.getElementById("main").innerHTML=fn();
}
function show(t){
  if(t==="login"){openLogin();return}if(t==="logout"){logout();return}
  if(t==="stafflogin"){openStaffLogin();return}if(t==="stafflogout"){staffLogout();return}
  if((t==="intel"||t==="scripts")&&!canViewInternal())t="home";
  CUR=t;buildNav();render();window.scrollTo({top:0,behavior:"smooth"});
}

/* ===== INIT ===== */
(async function(){
  if(!await loadDB())return;
  document.documentElement.lang=(LANG==="zh"?"zh-CN":"en");
  buildNav();
  document.getElementById("nav").addEventListener("click",e=>{if(e.target.dataset.t)show(e.target.dataset.t)});
  CUR="home";render();
  if(IS_ADMIN_URL && !isAdmin())openLogin();
  else if(IS_STAFF_URL && !isStaff())openStaffLogin();
})();
</script>
